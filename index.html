<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D-R4M</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Mono', monospace;
}

body{
    overflow:hidden;
    background:black;
    color:white;
    width:100vw;
    height:100vh;
    position:relative;
}

/* VIDEO FONDO */

#fondo{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.2;
}

/* TEXTO CENTRAL */

#mensaje{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    z-index:10;
}

#mensaje h1{
    font-size:3rem;
    letter-spacing:4px;
}

#mensaje p{
    margin-top:10px;
    opacity:0.7;
}

/* VENTANAS */

.ventana{
    position:absolute;
    background:rgba(20,20,20,0.95);
    border:2px solid white;
    border-radius:10px;
    overflow:hidden;

    box-shadow:
    0 0 20px rgba(255,255,255,0.2);

    animation:aparecer 0.3s ease;
}

.barra{

    width:100%;
    height:35px;

    background:white;
    color:black;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 10px;

    font-size:14px;
    font-weight:bold;
}

.cerrar{
    cursor:pointer;
    font-size:18px;
}

.contenido{
    padding:10px;
    width:100%;
    height:calc(100% - 35px);
}

/* IMAGENES */

.contenido img{

    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:5px;
}

/* VIDEOS */

.contenido video{

    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:5px;
}

/* TEXTOS */

.contenido p{

    font-size:15px;
    line-height:1.6;

    color:white;
}

    /* LINKS */

.portal{

    position:relative;

    width:100%;
    height:100%;

    cursor:pointer;

    overflow:hidden;

}

.portal img{

    width:100%;
    height:100%;

    object-fit:cover;

}

/* OVERLAY */

.portalOverlay{

    position:absolute;

    inset:0;

    background:rgba(0,0,0,0.2);

    display:flex;

    align-items:flex-end;

    justify-content:center;

    padding-bottom:20px;

    transition:0.3s;

}

/* TEXTO */

.portalTexto{

    color:white;

    font-size:12px;

    letter-spacing:3px;

    opacity:0.7;

    text-transform:uppercase;

}

/* EFECTO HOVER */

.portal:hover .portalOverlay{

    background:rgba(255,255,255,0.08);

}

/* FOOTER */

footer{

    position:fixed;

    bottom:10px;

    left:50%;

    transform:translateX(-50%);

    z-index:99999;

    font-size:11px;

    opacity:0.5;

    display:flex;

    gap:15px;

    letter-spacing:2px;

}

/* LINKS FOOTER */

footer a{

    color:white;

    text-decoration:none;

}

footer a:hover{

    opacity:1;

}

/* ANIMACION */

@keyframes aparecer{

    from{

        transform:scale(0.3);
        opacity:0;

    }

    to{

        transform:scale(1);
        opacity:1;

    }

}

</style>
</head>

<body>

<!-- VIDEO FONDO -->

<video id="fondo" autoplay muted loop>

<script>

/* =======================================================
SECUENCIA NARRATIVA
AQUI CONTROLAS EL ORDEN EXACTO

const secuencia = [

{

{

/* 5 */
{

},


/* 6 */

{

    width:320,
    height:400
},

/* 7 */

    {
    tipo:"imagen",

    archivo:"img/1.JPG",

    titulo:"DATA DR3AMS",

    width:300,
    height:380
},



/* 8 */

{
    tipo:"imagen",

    archivo:"img/q2.jpeg",

    titulo:"CACHE_SIGNAL",

    width:360,
    height:410
},

/* 9 */
 {
tipo:"imagen",

  archivo:"img/q1.jpeg",

titulo:"DATADR3ANS KFF",

    width:340,

},


/* 10 */

{
    tipo:"link",

    titulo:"SIMULACROON",

    width:340,
    height:420
},

/* 11 */

{
    tipo:"link",

    width:360,
    height:420
},

];


/* =======================================================
VARIABLES
======================================================= */

let contador = 0;

let indice = 0;

/* =======================================================
ENTER DESKTOP
======================================================= */

document.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        crearVentana();

    }

});

/* =======================================================
TAP MOBILE
======================================================= */

document.addEventListener("touchstart",()=>{

    crearVentana();

});

/* =======================================================
CREAR VENTANA
======================================================= */

function crearVentana(){

    /* reiniciar secuencia */

    if(indice >= secuencia.length){

        indice = 0;

    }

    /* obtener item actual */

    const item = secuencia[indice];

    contador++;

    /* crear ventana */

    const ventana = document.createElement("div");

    ventana.classList.add("ventana");

    /* tamaño */

    ventana.style.width =
    item.width + "px";

    ventana.style.height =
    item.height + "px";

    /* posicion */

    ventana.style.left =

    Math.random() *
    (window.innerWidth - item.width)

    + "px";

    ventana.style.top =

    Math.random() *
    (window.innerHeight - item.height)

    + "px";

    /* contenido */

    let contenidoHTML = "";

    /* VIDEO */

    if(item.tipo === "video"){

        contenidoHTML = `

        <video autoplay muted loop playsinline>

            <source
            src="${item.archivo}"
            type="video/mp4">

        </video>

        `;

    }

    /* IMAGEN */

    if(item.tipo === "imagen"){

        contenidoHTML = `

        <img src="${item.archivo}">

        `;

    }

    /* TEXTO */

    if(item.tipo === "texto"){

        contenidoHTML = `

        <p>${item.contenido}</p>

        `;

    }

    /* LINK EXTERNO */

if(item.tipo === "link"){

    contenidoHTML = `

    <div
    class="portal"
    data-url="${item.url}">

        <img src="${item.archivo}">

        <div class="portalOverlay">

            <div class="portalTexto">

                HOLD TO ENTER

            </div>

        </div>

    </div>

    `;

 }
    
    /* HTML FINAL */

    ventana.innerHTML = `

        <div class="barra">

            <span>${item.titulo}</span>

            <span class="cerrar">✕</span>

        </div>

        <div class="contenido">

            ${contenidoHTML}

        </div>

    `;

    /* agregar */

    document.body.appendChild(ventana);

    /* =========================================
PORTAL HOLD
========================================= */

const portal =
ventana.querySelector(".portal");

if(portal){

    let holdTimer;

    // DESKTOP

    portal.addEventListener("mousedown",()=>{

        holdTimer = setTimeout(()=>{

            window.open(
                portal.dataset.url,
                "_blank"
            );

        },600);

    });

    portal.addEventListener("mouseup",()=>{

        clearTimeout(holdTimer);

    });

    portal.addEventListener("mouseleave",()=>{

        clearTimeout(holdTimer);

    });

    // MOBILE

    portal.addEventListener("touchstart",()=>{

        holdTimer = setTimeout(()=>{

            window.open(
                portal.dataset.url,
                "_blank"
            );

        },600);

    });

    portal.addEventListener("touchend",()=>{

        clearTimeout(holdTimer);

    });

}

    /* sonido */

    const musica =
    document.getElementById("musica");

    if(musica.paused){

    musica.play().catch(err=>{

        console.log(err);

    });

}

    const glitch =
    document.getElementById("glitch");

    glitch.currentTime = 0;

     glitch.play();

    /* cerrar */

    ventana.querySelector(".cerrar")
    .addEventListener("click",()=>{

        ventana.remove();

    });

    /* arrastrar */

    hacerArrastrable(ventana);

    /* siguiente elemento */

    indice++;

}

/* =======================================================
DRAG WINDOWS
======================================================= */

function hacerArrastrable(elemento){

    let moviendo = false;

    let offsetX = 0;
    let offsetY = 0;

    const barra =
    elemento.querySelector(".barra");

    barra.addEventListener("mousedown",(e)=>{

        moviendo = true;

        offsetX =
        e.clientX - elemento.offsetLeft;

        offsetY =
        e.clientY - elemento.offsetTop;

    });

    document.addEventListener("mousemove",(e)=>{

        if(!moviendo) return;

        elemento.style.left =

        (e.clientX - offsetX)

        + "px";

        elemento.style.top =

        (e.clientY - offsetY)

        + "px";

    });

    document.addEventListener("mouseup",()=>{

        moviendo = false;

    });

}

    

</script>
